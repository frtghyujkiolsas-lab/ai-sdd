<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>先马电商 AI 工牌模板 - Pixel Perfect</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      font-family: "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    .badge-canvas {
      width: 900px;
      height: 1200px;
      position: relative;
      overflow: hidden;
      background: #fff url("./assets/reference-900x1200.png") 0 0 / 900px 1200px no-repeat;
    }

    /*
      Optional headshot overlay.
      Add `has-photo` to .badge-canvas and set the src to the generated ID photo.
      The default state keeps the original placeholder visible for 1:1 similarity.
    */
    .portrait-photo {
      position: absolute;
      left: 297px;
      top: 286px;
      width: 306px;
      height: 389px;
      object-fit: cover;
      border-radius: 16px;
      display: none;
    }

    .badge-canvas.has-photo .portrait-photo {
      display: block;
    }
  </style>
</head>
<body>
  <main class="badge-canvas" aria-label="先马电商员工工牌模板">
    <img class="portrait-photo" src="" alt="员工证件照" />
  </main>
</body>
</html>
